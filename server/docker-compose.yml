services:
  minecraft:
    image: itzg/minecraft-server:java21
    container_name: cozycreate
    tty: true
    stdin_open: true
    restart: unless-stopped
    network_mode: host
    stop_grace_period: 5m
    environment:
      EULA: "TRUE"
      TYPE: NEOFORGE
      VERSION: "1.21.1"
      NEOFORGE_VERSION: "21.1.228"

      EXEC_DIRECTLY: "TRUE"
      STOP_DURATION: "240"

      INIT_MEMORY: ${INIT_MEMORY:-16G}
      MAX_MEMORY: ${MAX_MEMORY:-16G}

      # JVM tuning — tune via .env (see .env.example)
      JVM_OPTS: "-Dfml.loginTimeout=600 -Dchunky.maxWorkingCount=200"
      JVM_XX_OPTS: >-
        -XX:+UnlockExperimentalVMOptions
        -XX:+UseZGC
        -XX:+ZGenerational
        -XX:+AlwaysPreTouch
        -XX:+DisableExplicitGC
        -XX:SoftMaxHeapSize=${SOFT_MAX_HEAP:-14G}

      ONLINE_MODE: "TRUE"
      SPAWN_PROTECTION: "0"
      MOTD: "CozyCreate"
      LOG_LEVEL: "WARN"

      VIEW_DISTANCE: "10"
      SIMULATION_DISTANCE: "6"

      ENABLE_RCON: "TRUE"
      RCON_PORT: "25575"
      RCON_PASSWORD_FILE: /run/secrets/rcon_password

    secrets:
      - rcon_password

    healthcheck:
      test: ["CMD", "mc-health"]
      start_period: 10m
      interval: 30s
      timeout: 10s
      retries: 10

    volumes:
      - ./data:/data
      - ./content/mods:/data/mods
      - ./content/config:/data/config
      - ./content/kubejs:/data/kubejs
      - ./content/patchouli_books:/data/patchouli_books
      - ./content/defaultconfigs:/data/defaultconfigs
      - ./content/server-icon.png:/data/server-icon.png

    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-16g}
          cpus: "${CPU_LIMIT:-12}"

  backups:
    image: itzg/mc-backup:latest
    container_name: cozycreate-backups
    depends_on:
      minecraft:
        condition: service_healthy
    restart: unless-stopped
    network_mode: host
    environment:
      BACKUP_INTERVAL: "6h"
      INITIAL_DELAY: "10m"
      PAUSE_IF_NO_PLAYERS: "true"
      PLAYERS_ONLINE_CHECK_INTERVAL: "5m"
      PRUNE_BACKUPS_DAYS: "14"
      BACKUP_METHOD: tar
      TAR_COMPRESS_METHOD: zstd
      LINK_LATEST: "true"
      BACKUP_NAME: cozycreate
      EXCLUDES: "*.jar,cache,logs,*.tmp,crash-reports,libraries"
      RCON_HOST: localhost
      RCON_PORT: "25575"
      RCON_PASSWORD_FILE: /run/secrets/rcon_password
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
    secrets:
      - rcon_password

secrets:
  rcon_password:
    file: ./rcon-password.txt
